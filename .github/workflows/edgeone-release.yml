name: Deploy EdgeOne Pages

on:
    push:
        tags:
            - "v*"

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    EDGEONE_PAGES_PROJECT: HazelSpam
    HAZELSPAM_RELEASE_ORIGIN: https://hazel.idols.ltd
    HAZELSPAM_CHANGELOG_URL: https://github.com/Yuuenn/HazelSpam/blob/main/CHANGELOG.md

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.30.3

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Verify Version Matches Tag
              run: |
                  TAG_VERSION="${GITHUB_REF_NAME#v}"
                  CURRENT_VERSION="$(node -p "require('./package.json').version")"
                  if [ "$CURRENT_VERSION" != "$TAG_VERSION" ]; then
                    echo "package.json version ($CURRENT_VERSION) does not match tag ($TAG_VERSION)" >&2
                    exit 1
                  fi

            - name: Build
              run: pnpm build

            - name: Deploy to EdgeOne Pages
              run: npx --yes edgeone@1.2.30 pages deploy ./dist -n "$EDGEONE_PAGES_PROJECT" -t "${{ secrets.EDGEONE_API_TOKEN }}"

            - name: Create Backup Release On GitHub
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: |
                      dist/HazelSpam.user.js
                      dist/HazelSpam.min.user.js
                      dist/latest.json
