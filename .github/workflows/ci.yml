name: CI

on:
    pull_request:
        branches:
            - dev
            - main
    push:
        branches:
            - dev
            - main

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  package-manager-cache: false

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.30.3

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Test
              run: pnpm test

            - name: Typecheck
              run: pnpm typecheck

            - name: Build
              run: pnpm build
